<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="./styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@latest?dev",
                "react-dom/client": "https://esm.sh/react-dom@latest/client?dev",
                "react/jsx-runtime": "https://esm.sh/react@latest/jsx-runtime?dev"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone@latest/babel.min.js"></script>
</head>
<body>
    <div id="app"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React from 'react';
        // import Header from "./Header"
        import {createRoot} from 'react-dom/client';

        <div id="app"></div>

        const app = document.getElementById('app');
        const root = createRoot(app);

        function Header() {
            return (
                <header>
                    <nav className="nav">
                        <img src="./react-icon.jpg" className="nav-logo"/>
                        <ul className="nav-items">
                            <li>Pricing</li>
                            <li>About</li>
                            <li>Contact</li>
                        </ul>
                    </nav>
                </header>
            )
        }        

        function MainContent() {
            return (
                <div>
                    <h1>Reasons I'm excited to learn React</h1>
                    <ol>
                        <li>It's a popular library, so i'll be able to fit in with the cool kits</li>
                        <li>I'm more likely to get a job as a developer if i know React</li>
                    </ol>
                </div>
            )
        }

        function Footer() {
            return (
                <footer>
                    <small>2026 James Dev. All rights reserved</small>
                </footer>
            )
        }

        function Page() {
            return (
                <div>
                    <Header />
                    <MainContent />
                    <Footer />
                </div>
            )
        }

        root.render(<Page/>)
    </script>
</body>
</html>
